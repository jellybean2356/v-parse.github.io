<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Daily Shop</title>
    <!-- Bust browser cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/main.css?v=17">
    <link rel="stylesheet" href="css/mobile.css?v=8">
</head>
<body>

<div class="container">
    <header class="app-header">
        <img src="css/logo.png" alt="Valorant Store" style="max-height: 280px; margin: 0;">
        
        <div id="auth-section" class="btn-group">
            <a class="btn btn-primary" href="https://auth.riotgames.com/authorize?client_id=riot-client&redirect_uri=https://v-parse.novelya.me/redirect&response_type=token%20id_token&scope=openid%20link%20ban%20riot%3A%2F%2Friot.com%2Fentitlements&nonce=1">
                Quick Login
            </a>
            <a class="btn btn-secondary" href="https://auth.riotgames.com/authorize?client_id=riot-client&redirect_uri=https://v-parse.novelya.me/redirect&response_type=token%20id_token&scope=openid%20link%20ban%20riot%3A%2F%2Friot.com%2Fentitlements&nonce=1&prompt=login">
                Switch Account / Force Login
            </a>
        </div>

        <!-- Header Profile UI moved top right -->
        <div id="logged-in-section" style="display:none;" class="profile-container">
            <div class="profile-badge">
                <svg class="profile-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                <span id="account-name-text"></span>
                <button id="logout-btn" class="btn-logout" onclick="logout()" title="Log Out">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <div id="shop-section" style="display:none;">
        <div id="shop-items">
            <!-- Items injected by JS -->
        </div>
    </div>
</div>

<!-- Skin Modal -->
<div id="skin-modal" class="modal" style="display:none;">
    <div class="modal-content" id="modal-box">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modal-skin-name" class="val-font" style="margin-bottom: 2rem; width: 100%; border-bottom: 1px solid var(--card-border); padding-bottom: 1rem;">Skin Name</h2>
        
        <div class="modal-layout">

            <!-- Left Side: Image and Variants -->
            <div class="modal-left">
                <div class="modal-image-container">
                    <img id="modal-image" src="" />
                </div>

                <div class="variants-title val-font">Variants</div>
                <div id="modal-variants" class="variants-container">
                    <!-- Swatches injected by JS -->
                </div>
            </div>

            <!-- Right Side: Video Preview & Stats -->
            <div class="modal-right" id="modal-right">
                <div class="modal-image-container" id="video-wrapper" style="display: none; position: relative;">
                    <video id="modal-video" controls loop preload="auto" style="width: 100%; height: 100%; max-height: 100%; object-fit: contain;"></video>
                    <div id="no-video-placeholder" style="display: none; position: absolute; inset: 0; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--val-gray); background: radial-gradient(circle, rgba(118,128,121,0.1) 0%, rgba(15,25,35,0) 70%);">No preview available</div>
                </div>
                
                <div class="variants-title val-font" style="margin-top: 1rem; width: 100%;">Purchase Stats</div>
                <div class="modal-stats" style="width: 100%; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 4px; padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem; box-sizing: border-box;">
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;">
                        <span style="color: var(--val-gray);">Price</span>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <img src="css/vp.png" alt="VP" style="width: 18px; height: 18px; object-fit: contain;">
                            <span id="modal-vp-cost" style="color: var(--val-white); font-size: 0.9rem;">0</span>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; border-top: 1px solid var(--card-border); padding-top: 0.8rem;">
                        <span style="color: var(--val-gray);">Estimated Real Money</span>
                        <span id="modal-eur-cost" style="color: var(--val-white); font-size: 0.9rem;">0.00€</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="js/app.js?v=14"></script>
</body>
</html>
